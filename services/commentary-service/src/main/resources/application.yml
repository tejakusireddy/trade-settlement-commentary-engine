server:
  port: 8084

spring:
  application:
    name: commentary-service
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5433/trade_settlement}
    username: ${POSTGRES_USERNAME:trade_user}
    password: ${POSTGRES_PASSWORD:trade_pass}
  flyway:
    enabled: true
    locations: classpath:db/migration
    ignore-migration-patterns: "*:Missing"
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    schema-registry-url: ${KAFKA_SCHEMA_REGISTRY_URL:http://localhost:8081}
    consumer:
      group-id: commentary-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      isolation-level: read_committed
    properties:
      schema.registry.url: ${KAFKA_SCHEMA_REGISTRY_URL:http://localhost:8081}

app:
  kafka:
    topics:
      breaches: trade.breaches
      completed: commentary.completed
      approved: commentary.approved
      dlq: trade.dlq

anthropic:
  api-key: ${ANTHROPIC_API_KEY:your-api-key-here}
  model: ${CLAUDE_MODEL:claude-sonnet-4-6}
  daily-cost-cap-usd: ${CLAUDE_DAILY_COST_CAP_USD:10.00}

resilience4j:
  circuitbreaker:
    instances:
      claude-api:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,circuitbreakers
  health:
    circuitbreakers:
      enabled: true
