server:
  port: 8082

spring:
  application:
    name: trade-ingest-service
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5433/trade_settlement}
    username: ${POSTGRES_USERNAME:trade_user}
    password: ${POSTGRES_PASSWORD:trade_pass}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      retries: 2147483647
    properties:
      enable.idempotence: true
      schema.registry.url: ${KAFKA_SCHEMA_REGISTRY_URL:http://localhost:8081}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

app:
  kafka:
    topics:
      trade-events: trade.events

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
