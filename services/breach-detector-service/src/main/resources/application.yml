server:
  port: 8083

spring:
  application:
    name: breach-detector-service
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5433/trade_settlement}
    username: ${POSTGRES_USERNAME:trade_user}
    password: ${POSTGRES_PASSWORD:trade_pass}
  flyway:
    enabled: true
    locations: classpath:db/migration
    ignore-migration-patterns: "*:future,*:missing"
    out-of-order: false
    baseline-on-migrate: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    schema-registry-url: ${KAFKA_SCHEMA_REGISTRY_URL:http://localhost:8081}
    consumer:
      group-id: breach-detector
      auto-offset-reset: earliest
      enable-auto-commit: false
      isolation-level: read_committed
    properties:
      schema.registry.url: ${KAFKA_SCHEMA_REGISTRY_URL:http://localhost:8081}

app:
  kafka:
    topics:
      trade-events: trade.events
      trade-breaches: trade.breaches
      commentary-completed: commentary.completed
      commentary-approved: commentary.approved
      trade-dlq: trade.dlq

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
